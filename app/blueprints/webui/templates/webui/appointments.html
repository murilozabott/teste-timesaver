{% extends "webui/base.html" %}
{% block title %}Agendamentos – TimeSaver{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Agendamentos</h2>
  <button class="btn btn-primary" id="btn-add-appt">+ Novo Agendamento</button>
</div>
<div id="alert-container"></div>

<div class="table-responsive">
  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>ID</th><th>Médico</th><th>Paciente</th>
        <th>Data/Hora</th><th>Status</th><th>Observações</th><th>Ações</th>
      </tr>
    </thead>
    <tbody id="appts-tbody">
      <tr><td colspan="7" class="text-center text-muted">Carregando…</td></tr>
    </tbody>
  </table>
</div>

<!-- Modal de criação e edição de agendamento -->
<div class="modal fade" id="apptModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="appt-modal-title">Novo Agendamento</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="modal-alert"></div>
        <form id="appt-form">
          <input type="hidden" id="appt-id">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Médico</label>
              <select class="form-select" id="appt-doctor" required></select>
            </div>
            <div class="col-md-6">
              <label class="form-label">ID do Paciente</label>
              <input type="number" class="form-control" id="appt-patient" min="1" required
                placeholder="Informe o ID do paciente">
            </div>
            <div class="col-md-6">
              <label class="form-label">Data e Hora</label>
              <input type="datetime-local" class="form-control" id="appt-datetime" required>
            </div>
            <!-- Campo de status exibido apenas na edição -->
            <div class="col-md-6 d-none" id="status-field">
              <label class="form-label">Status</label>
              <select class="form-select" id="appt-status">
                <option value="scheduled">Agendado</option>
                <option value="completed">Concluído</option>
                <option value="canceled">Cancelado</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Observações</label>
              <textarea class="form-control" id="appt-notes" rows="2"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" id="btn-save-appt">Salvar</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="{{ url_for('webui.static', filename='js/appointments.js') }}"></script>
{% endblock %}
