{% extends "webui/base.html" %}
{% block title %}Pacientes – TimeSaver{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Pacientes</h2>
  <button class="btn btn-primary" id="btn-add-patient">+ Adicionar Paciente</button>
</div>
<div id="alert-container"></div>

<div class="table-responsive">
  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>E-mail</th>
        <th>Data de Nascimento</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="patients-tbody">
      <tr><td colspan="5" class="text-center text-muted">Carregando…</td></tr>
    </tbody>
  </table>
</div>

<!-- Modal de cadastro de paciente -->
<div class="modal fade" id="addPatientModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Adicionar Paciente</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="modal-alert"></div>
        <form id="add-patient-form">
          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" id="p-name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-control" id="p-email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Data de Nascimento</label>
            <input type="date" class="form-control" id="p-birth" required>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" id="btn-save-patient">Salvar</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="{{ url_for('webui.static', filename='js/patients.js') }}"></script>
{% endblock %}
