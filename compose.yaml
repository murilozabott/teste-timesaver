services:
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      FLASK_APP: app:create_app
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: ["flask", "db", "upgrade"]
    profiles:
      - dev

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      FLASK_APP: app:create_app
      FLASK_ENV: development
      FLASK_DEBUG: "1"
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    profiles:
      - dev

  test:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      FLASK_APP: app:create_app
      FLASK_DB_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/healthcare_test
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      migrate-test:
        condition: service_completed_successfully
    command: ["python", "-m", "pytest", "-vv", "--tb=long"]
    profiles:
      - test

  migrate-test:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      FLASK_APP: app:create_app
      FLASK_DB_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/healthcare_test
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: ["flask", "db", "upgrade"]
    profiles:
      - test

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: